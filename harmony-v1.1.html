  <style>
    html, body { margin: 0; height: 100%; font-family: var(--wds-font-family-default, "Wix Madefor Text", "Madefor", sans-serif); }
    #root { width: 100%; height: 100%; }
    .hbtn { transition: filter 120ms ease, box-shadow 120ms ease; }
    .hbtn:hover:not(:disabled) { filter: brightness(0.92); }
    .hbtn:active:not(:disabled) { filter: brightness(0.85); transform: scale(0.99); }
    .hbtn-secondary:hover:not(:disabled) { background: #F4F4F4 !important; filter: none; }
    .hbtn-ghost:hover:not(:disabled) { background: rgba(47,93,255,0.07) !important; filter: none; }

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<body>
  <div id="root"></div>
  <script>
    window.START_STEP = 'v11';
    fetch('round-15.jsx?v=20260616c')
      .then(r => r.text())
      .then(src => {
        const compiled = Babel.transform(src, { presets: ['react'] }).code;
        eval(compiled);
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(window.HarmonyApp));
      })
      .catch(e => { document.getElementById('root').innerText = 'Error: ' + e.message; });
  </script>
